{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Remaz Pharm</title>

    <link rel="stylesheet" href="{% static 'css/password.recovery.css' %}">
</head>
<body>

<section class="login-page">

    <div class="lado-esquerdo">
        <div class="logo-area">
            <h1 class="logo">
                REMAZ
                <span>PHARM</span>
            </h1>
        </div>
    </div>

    <div class="lado-direito">
        <div class="form-box">

            <p class="boas-vindas">Bem-vindo de volta!</p>

            <div class="tabs">

                <a href="{% url 'login' %}" class="tab-link">
                    <div class="tab ativo {% if request.path == '/login/' %}ativo{% endif %}">
                        Entrar
                    </div>
                </a>

                <a href="{% url 'registro' %}" class="tab-link">
                    <div class="tab {% if request.path == '/registro/' %}ativo{% endif %}">
                        Registrar
                    </div>
                </a>

            </div>

            <form class="login-form" method="post">
                {% csrf_token %}

                <div class="campo">
                    <label for="usuario">Insira seu email ou número de telefone</label>
                    <input type="text" id="usuario" name="usuario" placeholder="Digite">
                </div>

                <button type="submit" class="btn-entrar">
                    Continuar
                </button>

            </form>

        </div>
    </div>

</section>

</body>
</html>
