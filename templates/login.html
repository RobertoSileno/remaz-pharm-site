{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Remaz Pharm</title>

    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

<section class="login-page">

    <div class="lado-esquerdo">
        <div class="logo-area">
            <h1 class="logo">
                REMAZ
                <span>PHARM</span>
            </h1>
        </div>
    </div>

    <div class="lado-direito">
        <div class="form-box">

            <p class="boas-vindas">Bem-vindo de volta!</p>

            <div class="tabs">

                <a href="{% url 'login' %}" class="tab-link">
                    <div class="tab {% if request.path == '/login/' %}ativo{% endif %}">
                        Entrar
                    </div>
                </a>

                <a href="{% url 'registro' %}" class="tab-link">
                    <div class="tab {% if request.path == '/registro/' %}ativo{% endif %}">
                        Registrar
                    </div>
                </a>

            </div>

            <form class="login-form" method="post">
                {% csrf_token %}

                <div class="campo">
                    <label for="usuario">Nome ou CPF</label>
                    <input type="text" id="usuario" name="usuario" placeholder="Digite">
                </div>

                <div class="campo">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Digite">
                </div>

                <div class="opcoes">

                    <label class="lembrar">
                        <input type="checkbox" name="lembrar">
                        lembrar de mim?
                    </label>

                    <a href="{% url 'recuperar_senha' %}" class="esqueci">
                        esqueceu a senha ?
                    </a>

                </div>

                <button type="submit" class="btn-entrar">
                    <a href="{% url 'dashboard' %}" class="btn-entrar-link">Entrar</a>
                </button>

            </form>

        </div>
    </div>

</section>

</body>
</html>
