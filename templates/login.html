{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Remaz Pharm</title>

    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

<section class="login-page">

    <!-- LADO ESQUERDO -->
    <div class="lado-esquerdo">

        <div class="logo-area">
            <h1 class="logo">
                <img src="{% static 'img/logo/logo.png' %}" alt="Logo Remaz Pharm">
            </h1>
        </div>

    </div>

    <!-- LADO DIREITO -->
    <div class="lado-direito">

        <div class="form-box">

            <p class="boas-vindas">Bem-vindo de volta!</p>

            <!-- TABS -->
            <div class="tabs">

                <a href="{% url 'login' %}" class="tab-link">
                    <div class="tab ativo">Entrar</div>
                </a>

                <a href="{% url 'registro' %}" class="tab-link">
                    <div class="tab">Registrar</div>
                </a>

            </div>

            <!-- FORM -->
            <form method="post">
                {% csrf_token %}

                <div class="campo">
                    <label>Nome ou CPF</label>
                    <input type="text" placeholder="Digite">
                </div>

                <div class="campo">
                    <label>Senha</label>
                    <input type="password" placeholder="Digite">
                </div>

                <div class="opcoes">

                    <label class="lembrar">
                        <input type="checkbox">
                        lembrar de mim?
                    </label>

                    <a href="{% url 'recuperar_senha' %}" class="esqueci">
                        esqueceu a senha ?
                    </a>
                </div>

                <!-- BOTÃO -->
                <button type="submit" class="btn-entrar">
                    Entrar
                </button>

            </form>

        </div>

    </div>

</section>

</body>
</html>
