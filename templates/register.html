{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Remaz Pharm</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

<section class="login-page">

    <div class="lado-esquerdo">
        <div class="logo-area">
            <h1 class="logo">
                REMAZ
                <span>PHARM</span>
            </h1>
        </div>
    </div>

    <div class="lado-direito">
        <div class="form-box">

            <p class="boas-vindas">Crie sua conta</p>

            <div class="tabs">

                <a href="{% url 'login' %}" class="tab-link">
                    <div class="tab {% if request.path == '/login/' %}ativo{% endif %}">
                        Entrar
                    </div>
                </a>

                <a href="{% url 'registro' %}" class="tab-link">
                    <div class="tab {% if request.path == '/registro/' %}ativo{% endif %}">
                        Registrar
                    </div>
                </a>

            </div>
            <form class="login-form" method="post">
                {% csrf_token %}

                <div class="campo">
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome">
                </div>

                <div class="campo">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" name="cpf" placeholder="Digite seu CPF">
                </div>

                <div class="campo">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="Digite seu e-mail">
                </div>

                <div class="campo">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha">
                </div>

                <button type="submit" class="btn-entrar">Registrar</button>
            </form>

        </div>
    </div>

</section>

</body>
</html>
