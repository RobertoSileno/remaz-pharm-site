{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Remaz Pharm</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

<section class="login-page">

     <!-- LADO ESQUERDO -->
    <div class="lado-esquerdo">

        <div class="logo-area">
            <h1 class="logo">
                <img src="{% static 'img/logo/logo.png' %}" alt="Logo Remaz Pharm">
            </h1>
        </div>

    </div>

     <!-- LADO DIREITO -->

    <div class="lado-direito">
        <div class="form-box">

            <p class="boas-vindas">Crie sua conta</p>

            <div class="tabs">

                <a href="{% url 'login' %}" class="tab-link">
                    <div class="tab {% if request.path == '/login/' %}ativo{% endif %}">
                        Entrar
                    </div>
                </a>

                <a href="{% url 'registro' %}" class="tab-link">
                    <div class="tab {% if request.path == '/registro/' %}ativo{% endif %}">
                        Registrar
                    </div>
                </a>

            </div>
            <form class="login-form" method="post">
                {% csrf_token %}

                <div class="campo">
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" name="username" required placeholder="Digite seu nome" pattern="[a-zA-Zá-ú\s]*" title="Somente letras são permitidas">
                </div>

                <div class="campo">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" name="cpf" placeholder="Digite seu CPF" pattern="(\d{3}\.\d{3}\.\d{3}-\d{2}|\d{11})" title="Somente números são permitidos" inputmode="numeric">
                </div>

                <div class="campo">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required placeholder="Digite seu e-mail">
                </div>

                <div class="campo">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="password" required placeholder="Digite sua senha">
                </div>

                <div class="campo">
                    <label for="password_confirm">Confirmar Senha</label>
                    <input type="password" id="password_confirm" name="password_confirm" required placeholder="Confirme sua senha">
                </div>

                <button type="submit" class="btn-entrar">Registrar</button>
            </form>
            {% if messages %}
                {% for message in messages %}
                    <p>{{ message }}</p>
                {% endfor %}
            {% endif %}

        </div>
    </div>

</section>

<script>
    // Campo de nome - apenas letras
    document.getElementById('nome').addEventListener('input', function(e) {
        this.value = this.value.replace(/[^a-zA-Zá-úà-ùâ-ûã-õ\s]/g, '');
    });
    
    // Campo CPF - apenas números
    document.getElementById('cpf').addEventListener('input', function(e) {
        this.value = this.value.replace(/[^0-9]/g, '').slice(0, 11);
        // Formata automaticamente: XXX.XXX.XXX-XX
        if (this.value.length > 0) {
            this.value = this.value
                .replace(/(\d{3})(\d)/, '$1.$2')
                .replace(/(\d{3})\.(\d{3})(\d)/, '$1.$2.$3')
                .replace(/(\d{3})\.(\d{3})\.(\d{3})(\d)/, '$1.$2.$3-$4');
        }
    });
</script>

</body>
</html>
